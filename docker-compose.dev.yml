version: '3.8'

services:
  db:
    image: postgres:16
    container_name: qg-db
    environment:
      POSTGRES_USER: quantguild
      POSTGRES_PASSWORD: quantguild
      POSTGRES_DB: quantguild
    ports:
      - "5432:5432"
    volumes:
      - qg_postgres:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: qg-redis
    ports:
      - "6379:6379"
    volumes:
      - qg_redis:/data
    restart: unless-stopped

  minio:
    image: minio/minio
    container_name: qg-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - qg_minio:/data
    restart: unless-stopped

volumes:
  qg_postgres:
  qg_redis:
  qg_minio:
